<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Geodude Bookmarks</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        width: 320px;
        min-height: 120px;
        background: #0f0f0f;
        color: white;
        font-family: system-ui, -apple-system, sans-serif;
      }

      header {
        background: linear-gradient(135deg, #6c47ff, #a855f7);
        padding: 14px 16px 12px;
      }

      header h1 {
        font-size: 15px;
        font-weight: 700;
      }

      #page-label {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.6);
        margin-top: 3px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      #main-body {
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      #empty-msg {
        display: none;
        text-align: center;
        color: #555;
        font-size: 13px;
        padding: 24px 16px;
      }

      #bookmark-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .bm-card {
        background: #1a1a1a;
        border: 1px solid #2a2a2a;
        border-radius: 12px;
        padding: 11px 12px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 10px;
        transition: border-color 0.2s, background 0.2s;
      }

      .bm-card:hover {
        border-color: #6c47ff;
        background: #1e1a2e;
      }

      .bm-name {
        flex: 1;
        font-size: 13px;
        font-weight: 600;
        color: #e0d7ff;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .bm-delete {
        flex-shrink: 0;
        background: transparent;
        border: none;
        color: #444;
        font-size: 14px;
        cursor: pointer;
        padding: 2px 4px;
        border-radius: 6px;
        transition: color 0.15s, background 0.15s;
      }

      .bm-delete:hover {
        color: white;
        background: #6c47ff;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>🪨 Geodude Bookmarks</h1>
      <div id="page-label">Loading…</div>
    </header>

    <div id="main-body">
      <div id="empty-msg">No bookmarks on this page yet.</div>
      <div id="bookmark-list"></div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
